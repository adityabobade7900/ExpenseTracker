<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Expense — Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <!-- ── HEADER ── -->
        <h1 class="page-title">✏️ Edit Expense</h1>

        <!-- ── EDIT FORM ── -->
        <section class="form-section">
            <h2 class="section-title">Update Expense #{{ expense['id'] }}</h2>

            <form method="post" action="/update/{{ expense['id'] }}" class="expense-form">

                <div class="form-group">
                    <label for="description">Description</label>
                    <input
                        type="text"
                        id="description"
                        name="description"
                        value="{{ expense['description'] }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" required>
                        {% set categories = ["Food", "Travel", "Shopping", "Bills", "Other"] %}
                        {% for cat in categories %}
                        <option
                            value="{{ cat }}"
                            {% if expense['category'] == cat %}selected{% endif %}
                        >
                            {{ cat }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input
                        type="number"
                        id="amount"
                        name="amount"
                        value="{{ expense['amount'] }}"
                        step="0.01"
                        min="0.01"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input
                        type="date"
                        id="date"
                        name="date"
                        value="{{ expense['date'] }}"
                        required
                    >
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-add">💾 Save Changes</button>
                    <a href="/" class="btn btn-cancel">✕ Cancel</a>
                </div>

            </form>
        </section>

    </div><!-- /.container -->

</body>
</html>
